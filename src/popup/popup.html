<!doctype html>
<html lang="nb">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>brreg-snap</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main id="app" data-state="loading" data-accent="teal">
      <header>
        <h1><img id="brand-mark" class="brand-mark" alt="" />brreg-snap</h1>
      </header>
      <section id="status" aria-live="polite">Slår opp bedrift…</section>
      <section id="result" hidden></section>
      <a
        id="details-link"
        href="#"
        hidden
        >Detaljert visning ↗</a
      >
      <section id="picker" hidden>
        <p class="picker-intro">Vi fant flere mulige treff på denne siden:</p>
        <ul id="picker-list" class="picker-list"></ul>
        <button type="button" id="picker-none" class="picker-none">
          Ingen av disse
        </button>
      </section>
      <section id="empty-state" hidden>
        <p id="empty-message" class="empty-message"></p>
        <div class="manual-search">
          <label for="manual-query" class="manual-search-label"
            >Søk i Brønnøysundregistrene</label
          >
          <input
            id="manual-query"
            type="search"
            autocomplete="off"
            placeholder="Bedriftsnavn eller 9-sifret orgnr"
            spellcheck="false"
          />
          <ul id="manual-results" class="manual-results"></ul>
        </div>
      </section>
      <footer>
        <a
          id="brreg-link"
          href="https://virksomhet.brreg.no/nb/oppslag/enheter"
          target="_blank"
          rel="noopener noreferrer"
          >Åpne på brreg.no ↗</a
        >
      </footer>
    </main>
    <script type="module" src="popup.ts"></script>
  </body>
</html>
