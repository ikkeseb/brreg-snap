<!doctype html>
<html lang="nb">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>brreg-now</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main id="app" data-state="loading">
      <header>
        <h1>brreg-now</h1>
      </header>
      <section id="status" aria-live="polite">Slår opp bedrift…</section>
      <section id="result" hidden></section>
      <a
        id="details-link"
        href="#"
        hidden
        >Detaljert visning ↗</a
      >
      <section id="search" hidden>
        <label for="query">Søk i Brønnøysundregistrene</label>
        <input
          id="query"
          type="search"
          autocomplete="off"
          placeholder="Bedriftsnavn eller 9-sifret orgnr"
          spellcheck="false"
        />
        <ul id="search-results"></ul>
      </section>
      <footer>
        <a
          id="brreg-link"
          href="https://virksomhet.brreg.no/nb/oppslag/enheter"
          target="_blank"
          rel="noopener noreferrer"
          >Åpne på brreg.no ↗</a
        >
      </footer>
    </main>
    <script type="module" src="popup.ts"></script>
  </body>
</html>
